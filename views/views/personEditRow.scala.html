@(p: hiss.Person)
<tr id="row-@{p.id}">
  <td>@{p.id}</td>
  <td><input type="text" name="name" value="@{p.name}" form="edit-@{p.id}" required /></td>
  <td><input type="text" name="town" value="@{p.town.getOrElse("")}" form="edit-@{p.id}" /></td>
  <td>
    <form id="edit-@{p.id}"
          hx-put="/ui/people/@{p.id}"
          hx-target="#people-tbody"
          hx-swap="innerHTML"
          style="display:inline">
      <button type="submit">Save</button>
    </form>
    <button hx-get="/ui/people/rows"
            hx-target="#people-tbody"
            hx-swap="innerHTML">Cancel</button>
  </td>
</tr>
